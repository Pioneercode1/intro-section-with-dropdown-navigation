<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Intro section with dropdown navigation</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>

</head>

<body>

  <header class="header">
    <div class="logo-img-container">
      <img class="logo-img" src="./images/logo.svg" alt="logo image" width="62" height="48">
    </div>
    <div class="logo-menu-container">
      <button class="btn-menu">
        <img class="logo-menu" src="./images/icon-menu.svg" alt="icon menu" width="32" height="28">
      </button>
    </div>

    <div class="menu-content">
      <button class="btn-icon-close">
        <img class="icon-close" src="./images/icon-close-menu.svg" alt="icon close menu" width="28" height="28">
      </button>
      <nav class="nav-container">
        <ul class="ul-menu">
          <ul class="ul-features">
            <li class="li-features">
              <span>Features</span>
              <img src="./images/icon-arrow-down.svg" alt="icon arrow down">
              <div class="menu-sub-features">
                <a><img src="./images/icon-todo.svg" alt="icon todo list"><span>Todo List</span></a>
                <a><img src="./images/icon-calendar.svg" alt="icon calendar"><span>Calendar</span></a>
                <a><img src="./images/icon-reminders.svg" alt="icon reminders"><span>Reminders</span></a>
                <a><img src="./images/icon-planning.svg" alt="icon planning"><span>Planning</span></a>
              </div>
            </li>
          </ul>
          <ul class="ul-company">
            <li class="li-company">
              <span>Company</span>
              <img src="./images/icon-arrow-down.svg" alt="icon arrow down">
              <div class="menu-sub-company">
                <a>History</a>
                <a>Our Team</a>
                <a>Blog</a>
              </div>
            </li>
          </ul>
          <li class="li-careers">Careers</li>
          <li class="li-about">About</li>
        </ul>
      </nav>
      <div class="btn-content">
        <button class="btn-login">Login</button>
        <button class="btn-register">Register</button>
      </div>
    </div>
  </header>

  <main class="app-container">
    <img class="img-hero" src="./images/image-hero-mobile.png" alt="image hero mobile" width="375" height="auto">
    <div class="hero-content">
      <h1 class="h-hero">Make remote work</h1>
      <p class="p-descripion">Get your team in sync, no matter your location. Streamline processes,
        create team rituals, and watch productivity soar.</p>
    </div>
    <button class="btn-main">Learn more</button>
  </main>

  <footer class="footer-main">
    <div class="img-footer">
      <img src="./images/client-databiz.svg" alt="client databiz image" width="90" height="auto">
      <img src="./images/client-audiophile.svg" alt="client audiophile image" width="90" height="auto">
      <img src="./images/client-meet.svg" alt="client meet image" width="90" height="auto">
      <img src="./images/client-maker.svg" alt="client maker image" width="90" height="auto">
    </div>
  </footer>
</body>

</html>
